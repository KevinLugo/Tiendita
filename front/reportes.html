<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reportes - Sistema de Inventario</title>
    <link rel="stylesheet" href="productos.css">
    <style>
        .filtros { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn-filtro { background: #e2e8f0; color: #333; font-weight: bold; }
        .btn-filtro.activo { background: #2E7D32; color: white; }
        .resumen-reportes { display: flex; gap: 20px; margin-bottom: 30px; }
        .card-reporte { background: white; padding: 20px; border-radius: 8px; flex: 1; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .card-reporte h3 { color: #666; font-size: 14px; margin-bottom: 5px; }
        .card-reporte p { font-size: 32px; font-weight: bold; color: #2E7D32; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Reportes de Ventas</h1>
        
        <div class="acciones">
            <a href="inicio.html"><button style="background:#666;">← Volver al inicio</button></a>
        </div>

        <!-- Botones de Filtro -->
        <div class="filtros">
            <button class="btn-filtro activo" onclick="filtrarReportes('hoy', this)">Hoy</button>
            <button class="btn-filtro" onclick="filtrarReportes('semana', this)">Esta Semana</button>
            <button class="btn-filtro" onclick="filtrarReportes('mes', this)">Este Mes</button>
            <button class="btn-filtro" onclick="filtrarReportes('todo', this)">Todo el Historial</button>
        </div>

        <div class="resumen-reportes">
            <div class="card-reporte">
                <h3>Ventas en el período</h3>
                <p id="totalTransacciones">0</p>
            </div>
            <div class="card-reporte">
                <h3>Ingresos del período</h3>
                <p id="ingresosTotales">$0.00</p>
            </div>
        </div>

        <h2>Detalle de Ventas</h2>
        <table id="tablaReportes">
            <thead>
                <tr>
                    <th>Folio</th>
                    <th>Fecha</th>
                    <th>Productos Vendidos</th>
                    <th>Total</th>
                    <th>Quien vendio</th>
                </tr>
            </thead>
            <tbody id="cuerpoTablaReportes">
                <!-- Se llena con magia -->
            </tbody>
        </table>
    </div>

    <script src="reportes.js"></script>
</body>
</html>
