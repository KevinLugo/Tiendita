<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ventas - Sistema de Inventario</title>
    <link rel="stylesheet" href="ventas.css">

    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
        }

        .container {
            width: 95%;
            margin: auto;
        }

        input {
            padding: 10px;
            width: 100%;
            margin-bottom: 15px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        table {
            width: 100%;
            background: white;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
            text-align: center;
        }

        th {
            background: #2e7d32;
            color: white;
        }

        button {
            padding: 5px 10px;
            cursor: pointer;
        }

        .total-venta {
            font-size: 28px;
            font-weight: bold;
            color: #2e7d32;
            text-align: right;
            margin: 20px 0;
        }

        .btn-finalizar {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            background: #1B5E20;
            color: white;
            border: none;
        }
    </style>
</head>

<body>
<div class="container">

    <h1>Punto de Venta</h1>
    <div class="acciones">
            <a href="inicio.html"><button style="background:#666;">← Volver al inicio</button></a>
        </div>

    <h2>Buscar Producto</h2>
    <input type="text" id="buscador" placeholder="Buscar por nombre o código...">

    <table id="tablaProductos">
        <thead>
            <tr>
                <th>Código</th>
                <th>Nombre</th>
                <th>Categoría</th>
                <th>Proveedor</th>
                <th>Precio</th>
                <th>Stock</th>
                <th>Stock Min</th>
                <th>Caducidad</th>
                <th>Acción</th>
            </tr>
        </thead>
        <tbody id="cuerpoProductos"></tbody>
    </table>

    <h2>Carrito</h2>

    <table id="tablaCarrito">
        <thead>
            <tr>
                <th>Producto</th>
                <th>Precio</th>
                <th>Cantidad</th>
                <th>Subtotal</th>
                <th>Acción</th>
            </tr>
        </thead>
        <tbody id="cuerpoCarrito"></tbody>
    </table>

    <div class="total-venta">
        Total: $<span id="totalVentaActual">0.00</span>
    </div>

    <button onclick="finalizarVenta()" class="btn-finalizar">
        Finalizar Venta
    </button>

</div>

<script src="ventas.js"></script>
</body>
</html>
